name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: tct
            label: macos-aarch64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: tct.exe
            label: windows-amd64
            ext: ".exe"
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: tct
            label: linux-amd64
            ext: ""

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Need tags so build.rs can stamp the version via git describe.
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1, stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Compute version
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            v="${GITHUB_REF#refs/tags/}"; v="${v#v}"
          else
            v="snap-$(date -u +%Y-%m-%d)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "tct-${{ steps.ver.outputs.version }}-${{ matrix.label }}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tct-${{ steps.ver.outputs.version }}-${{ matrix.label }}${{ matrix.ext }}
          path: tct-${{ steps.ver.outputs.version }}-${{ matrix.label }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: artifacts/**/*
          generate_release_notes: true
